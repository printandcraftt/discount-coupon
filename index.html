<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Print & Craft - Surprise Discount</title>

<!-- PWA Support -->
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#6a00ff">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(270deg,#6a00ff,#a64dff,#7b2cff);
background-size:400% 400%;
animation:gradientMove 15s ease infinite;
overflow:hidden;
color:white;
text-align:center;
padding:20px;
position:relative;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating background shapes */

.floating{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.15);
animation:float 20s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* Brand title */

.brand{
position:absolute;
top:20px;
font-size:20px;
font-weight:bold;
z-index:2;
}

/* Main reward card */

.card{
width:100%;
max-width:340px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
padding:30px 20px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
z-index:2;
}

.discount{
font-size:36px;
font-weight:bold;
margin:15px 0;
}

.legendary{
color:gold;
text-shadow:0 0 15px gold;
}

.small{
font-size:12px;
margin-top:8px;
opacity:.9;
}

.visit-btn{
margin-top:10px;
padding:12px 25px;
border-radius:25px;
border:none;
background:white;
color:#6a00ff;
font-weight:bold;
font-size:14px;
cursor:pointer;
transition:0.3s;
}

.visit-btn:hover{
transform:scale(1.05);
background:gold;
color:black;
}

/* Floating winners popup */

#winnerTicker{
position:fixed;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
padding:10px 14px;
border-radius:14px;
font-size:12px;
opacity:0;
transition:0.4s;
max-width:200px;
z-index:3;
}

.showWinner{
opacity:1;
}

/* Confetti canvas */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:1;
}

</style>

</head>

<body>

<!-- Floating shapes -->
<div class="floating" style="width:60px;height:60px;left:10%;animation-duration:18s;"></div>
<div class="floating" style="width:80px;height:80px;left:40%;animation-duration:22s;"></div>
<div class="floating" style="width:70px;height:70px;left:75%;animation-duration:20s;"></div>

<div class="brand">Print & Craft 💜</div>

<canvas id="confetti"></canvas>

<div class="card" id="content">
</div>

<div id="winnerTicker"></div>

<script>
const now = new Date();
const today = now.toDateString();
const lastPlayed = localStorage.getItem("lastPlayedDate");
const content = document.getElementById("content");

function formatDateTime(date){
return date.toLocaleString("en-US",{
month:"long",
day:"numeric",
year:"numeric",
hour:"2-digit",
minute:"2-digit"
});
}

function goToMain(){
window.open("https://printandcraftt.github.io/Print_and_Craft_New/","_blank");
}

function openMessenger(){
window.open("https://m.me/61579128398313","_blank");
}

/* Countdown until tomorrow */

function startCountdown(){

setInterval(()=>{

const now = new Date();
const tomorrow = new Date();
tomorrow.setHours(24,0,0,0);

const diff = tomorrow - now;

let h = Math.floor(diff/1000/60/60);
let m = Math.floor(diff/1000/60%60);
let s = Math.floor(diff/1000%60);

document.getElementById("countdown").innerText =
"Next reward in: "+h+"h "+m+"m "+s+"s";

},1000);

}

if(lastPlayed === today){

const savedDiscount = localStorage.getItem("rewardDiscount");
const savedCode = localStorage.getItem("rewardCode");

content.innerHTML = `
<h2>💜 Already Claimed Today</h2>

<div class="small">Your Reward</div>

<div class="discount">${savedDiscount}</div>

<div class="small">Code: ${savedCode}</div>

<div id="countdown" class="small"></div>

<button class="visit-btn" onclick="goToMain()">Visit Website</button>
`;

startCountdown();

}else{

localStorage.setItem("lastPlayedDate", today);

content.innerHTML = `
<h2>✨ Checking Your Luck...</h2>
<div class="small">Preparing your reward...</div>
`;

setTimeout(()=>{

const discounts = [
{value:"₱5 OFF",weight:100},
{value:"₱10 OFF",weight:0},
{value:"₱15 OFF",weight:0},
{value:"₱20 OFF",weight:0},
{value:"₱50 OFF",weight:0},
{value:"₱100 OFF",weight:0}
];

function getWeightedRandom(){

let totalWeight = discounts.reduce((sum,item)=>sum+item.weight,0);

let random = Math.random() * totalWeight;

for(let item of discounts){

if(random < item.weight) return item.value;

random -= item.weight;

}

}

const randomDiscount = getWeightedRandom();
const code = "CRAFT-"+Math.random().toString(36).substring(2,8).toUpperCase();
  
localStorage.setItem("rewardDiscount", randomDiscount);
localStorage.setItem("rewardCode", code);
  
const dateTime = formatDateTime(now);

content.innerHTML = `
<h2>🎉 Congratulations!</h2>

<div class="discount">${randomDiscount}</div>

<div class="small">Code: ${code}</div>

<div class="small">Claimed on: ${dateTime}</div>

<div id="expireTimer" class="small"></div>

<div class="small">📸 Please screenshot this reward and send it to our Messenger to claim.</div>

<button class="visit-btn" onclick="openMessenger()">Order via Messenger</button>

<button class="visit-btn" onclick="goToMain()">Visit Website</button>
`;

/* Expiration timer */

let expireTime = new Date().getTime() + 86400000;

setInterval(()=>{

let now = new Date().getTime();
let diff = expireTime - now;

let h = Math.floor(diff/1000/60/60);
let m = Math.floor(diff/1000/60%60);
let s = Math.floor(diff/1000%60);

document.getElementById("expireTimer").innerText =
"Code expires in: "+h+"h "+m+"m "+s+"s";

},1000);

/* Send to Google Sheets */

fetch("https://script.google.com/macros/s/AKfycbzOfS4_Hfd1ngTKnDo24jfeKKGq1mONAQpMUFvE-bw2BNlFWldOzC7fOhIzC-0d2sFg/exec",{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
date: now.toLocaleDateString(),
time: now.toLocaleTimeString(),
discount: randomDiscount,
code: code
})
});

},2500);

}
  /* Floating Winners Popup */

const ticker = document.getElementById("winnerTicker");

fetch("https://script.google.com/macros/s/AKfycbzOfS4_Hfd1ngTKnDo24jfeKKGq1mONAQpMUFvE-bw2BNlFWldOzC7fOhIzC-0d2sFg/exec")

.then(res => res.json())

.then(data => {

let index = 0;

function showWinner(){

if(!data.length) return;

let w = data[index];

ticker.innerHTML = "🎉 Someone won " + w.discount;

ticker.classList.add("showWinner");

setTimeout(()=>{

ticker.classList.remove("showWinner");

},4000);

index++;

if(index >= data.length) index = 0;

}

showWinner();

setInterval(showWinner,7000);

});


/* Confetti Animation */

const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const pieces = [];

for(let i=0;i<60;i++){

pieces.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height - canvas.height,

size:Math.random()*6+3,

speed:Math.random()*2+1,

color:`hsl(${Math.random()*360},70%,60%)`

});

}

function startConfetti(){

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let p of pieces){

ctx.fillStyle = p.color;

ctx.fillRect(p.x,p.y,p.size,p.size);

p.y += p.speed;

if(p.y > canvas.height) p.y = -10;

}

requestAnimationFrame(update);

}

update();

}
</script>
</body>
</html>
